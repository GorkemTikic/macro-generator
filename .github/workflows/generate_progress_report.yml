name: Generate Progress Report

on:
  push:
    branches:
      - main
    # Only trigger on actual project source changes — not reporting scripts,
    # workflow configs, vault/docs, or the report files themselves.
    paths:
      - 'src/**'
      - 'public/**'
      - 'worker/**'
      - 'index.html'
      - 'package.json'
  schedule:
    # Run every day at 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to fetch full git history

      - name: Checkout screenshot-library
        uses: actions/checkout@v4
        with:
          repository: GorkemTikic/screenshot-library
          path: screenshot-library
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install @google/genai markdown-it playwright
          npx playwright install chromium --with-deps

      - name: Generate Report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/generate_report.mjs

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/PROJECT_PROGRESS_REPORT.md reports/PROJECT_PROGRESS_REPORT_STYLED.html reports/PROJECT_PROGRESS_REPORT_STYLED.pdf
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: update project progress report [skip ci]"
          git push
